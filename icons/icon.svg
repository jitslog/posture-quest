<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- upright figure with a straight spine -->
  <g fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="256" cy="150" r="40" fill="#ffffff" stroke="none"/>
    <!-- straight spine -->
    <line x1="256" y1="200" x2="256" y2="330"/>
    <!-- shoulders pulled back -->
    <path d="M196 232 H316"/>
    <!-- pelvis / tucked -->
    <path d="M256 330 L214 408 M256 330 L298 408"/>
  </g>
  <!-- alignment plumb line -->
  <line x1="256" y1="96" x2="256" y2="430" stroke="#ffffff" stroke-width="6" stroke-dasharray="4 22" opacity="0.55"/>
</svg>
